<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FastAPI Console</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent-1: #00e5a0;
      --accent-2: #7b61ff;
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --error: #ff5c7a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem 4rem;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      opacity: 0.12;
    }
    .orb-1 { width: 400px; height: 400px; background: var(--accent-1); top: -100px; left: -100px; animation: drift 8s ease-in-out infinite alternate; }
    .orb-2 { width: 350px; height: 350px; background: var(--accent-2); bottom: -80px; right: -80px; animation: drift 10s ease-in-out infinite alternate-reverse; }

    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(30px, 20px); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 780px;
    }

    .header {
      text-align: center;
      margin-bottom: 3rem;
      animation: slideUp 0.6s ease forwards;
    }

    .badge {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent-1);
      border: 1px solid rgba(0,229,160,0.3);
      padding: 0.3rem 0.8rem;
      border-radius: 2px;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }
    h1 span { color: var(--accent-1); }

    .subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 300;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    @media (max-width: 580px) {
      .cards { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.75rem;
      animation: slideUp 0.7s ease forwards;
      opacity: 0;
    }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .card-icon {
      width: 36px; height: 36px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .card-1 .card-icon { background: rgba(0,229,160,0.12); color: var(--accent-1); }
    .card-2 .card-icon { background: rgba(123,97,255,0.12); color: var(--accent-2); }

    .card-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .card-route {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    .field { margin-bottom: 0.9rem; }

    label {
      display: block;
      font-size: 0.72rem;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    input[type="number"] {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.65rem 0.85rem;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .card-1 input:focus { border-color: rgba(0,229,160,0.4); }
    .card-2 input:focus { border-color: rgba(123,97,255,0.4); }

    .btn-submit {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 4px;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s;
    }
    .btn-submit:hover { transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .card-1 .btn-submit { background: var(--accent-1); color: #061a10; }
    .card-1 .btn-submit:hover { box-shadow: 0 0 20px rgba(0,229,160,0.35); }

    .card-2 .btn-submit { background: var(--accent-2); color: #fff; }
    .card-2 .btn-submit:hover { box-shadow: 0 0 20px rgba(123,97,255,0.4); }

    .result-box {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 4px;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      display: none;
      word-break: break-all;
    }
    .result-box.show { display: block; }
    .result-box.success { background: rgba(0,229,160,0.08); border: 1px solid rgba(0,229,160,0.25); color: var(--accent-1); }
    .result-box.error   { background: rgba(255,92,122,0.08); border: 1px solid rgba(255,92,122,0.25); color: var(--error); }

    .result-label { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.6; margin-bottom: 0.3rem; }
    .result-value { font-size: 1.1rem; }

    .loader {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="container">
    <div class="header">
      <div class="badge">FastAPI Interface</div>
      <h1>API <span>Console</span></h1>
      <p class="subtitle">Envoie des requetes aux endpoints directement depuis le navigateur</p>
    </div>

    <div class="cards">

      <!-- Card Double -->
      <div class="card card-1">
        <div class="card-header">
          <div class="card-icon">2x</div>
          <div>
            <div class="card-title">Double</div>
            <div class="card-route">GET /double/multiplier/{x}</div>
          </div>
        </div>

        <div class="field">
          <label for="double-x">Valeur x</label>
          <input type="number" id="double-x" placeholder="ex: 21" />
        </div>

        <button class="btn-submit" id="btn-double" onclick="callDouble()">Envoyer</button>

        <div class="result-box" id="result-double">
          <div class="result-label">Resultat</div>
          <div class="result-value" id="result-double-val"></div>
        </div>
      </div>

      <!-- Card Compute -->
      <div class="card card-2">
        <div class="card-header">
          <div class="card-icon">M</div>
          <div>
            <div class="card-title">Compute Salary</div>
            <div class="card-route">POST /compute/salary</div>
          </div>
        </div>

        <div class="field">
          <label for="salary">Salaire</label>
          <input type="number" id="salary" placeholder="ex: 3000" />
        </div>
        <div class="field">
          <label for="bonus">Bonus</label>
          <input type="number" id="bonus" placeholder="ex: 500" />
        </div>
        <div class="field">
          <label for="taxes">Taxes</label>
          <input type="number" id="taxes" placeholder="ex: 400" />
        </div>

        <button class="btn-submit" id="btn-compute" onclick="callCompute()">Calculer</button>

        <div class="result-box" id="result-compute">
          <div class="result-label">Resultat net</div>
          <div class="result-value" id="result-compute-val"></div>
        </div>
      </div>

    </div>
  </div>

  <div class="footer">FASTAPI - RUNNING LOCALLY</div>

  <script>
    async function callDouble() {
      const x   = document.getElementById('double-x').value.trim();
      const btn = document.getElementById('btn-double');
      const box = document.getElementById('result-double');
      const val = document.getElementById('result-double-val');

      if (x === '') { showResult(box, val, 'Veuillez entrer une valeur.', 'error'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="loader"></span>Envoi…';

      try {
        const res  = await fetch(`/double/multiplier/${encodeURIComponent(x)}`);
        const data = await res.json();
        if (res.ok) {
          showResult(box, val, data.result, 'success');
        } else {
          showResult(box, val, data.detail || 'Erreur serveur', 'error');
        }
      } catch {
        showResult(box, val, 'Impossible de joindre le serveur.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Envoyer';
      }
    }

    async function callCompute() {
      const salary = document.getElementById('salary').value.trim();
      const bonus  = document.getElementById('bonus').value.trim();
      const taxes  = document.getElementById('taxes').value.trim();
      const btn    = document.getElementById('btn-compute');
      const box    = document.getElementById('result-compute');
      const val    = document.getElementById('result-compute-val');

      if (!salary || !bonus || !taxes) {
        showResult(box, val, 'Les 3 champs sont requis.', 'error');
        return;
      }

      if (salary < 0 || bonus < 0 || taxes < 0) {
        showResult(box, val, 'Les valeurs doivent etre positives.', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="loader"></span>Calcul…';

      try {
        const res  = await fetch('/compute/salary', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            salary: parseFloat(salary),
            bonus:  parseFloat(bonus),
            taxes:  parseFloat(taxes)
          })
        });
        const data = await res.json();
        if (res.ok) {
          showResult(box, val, `${data.result} euros`, 'success');
        } else {
          showResult(box, val, data.detail || 'Erreur serveur', 'error');
        }
      } catch {
        showResult(box, val, 'Impossible de joindre le serveur.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Calculer';
      }
    }

    function showResult(box, val, message, type) {
      box.className = `result-box show ${type}`;
      val.textContent = message;
    }

    // Touche Entree
    document.getElementById('double-x').addEventListener('keydown', e => { if (e.key === 'Enter') callDouble(); });
    document.getElementById('taxes').addEventListener('keydown',    e => { if (e.key === 'Enter') callCompute(); });
  </script>

</body>
</html>
